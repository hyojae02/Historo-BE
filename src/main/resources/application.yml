server:
  port: ${PORT:8080}

app:
  s3:
    base-url: https://historo-images.s3.ap-northeast-2.amazonaws.com
  jwt:
    secret: ${JWT_SECRET:historo-dev-secret-key-at-least-32-chars-long!!}
    expiration-ms: 86400000

spring:
  jackson:
    default-property-inclusion: non_null

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

---
# 로컬 개발용 (H2 인메모리 DB)
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:historo
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---
# 배포용 (MySQL)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:historo}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
